_schema-version: "3.1"
ID: bookshop
version: 1.0.0
description: CAP Bookshop Application

modules:
  - name: bookshop-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm
    requires:
      - name: bookshop-db

resources:
  - name: bookshop-db
    type: org.cloudfoundry.managed-service
    parameters:
      service: hana
      service-plan: hdi-shared
