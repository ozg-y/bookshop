_schema-version: "3.1"
ID: bookshop
version: 1.0.0
description: CAP Bookshop Application

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install
        - npx cds build --production

modules:
  # ---- Backend (CAP Node.js Server) ----
  - name: bookshop-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: bookshop-auth
      - name: bookshop-db

  # ---- HANA DB Deployer (HDI Container) ----
  - name: bookshop-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    requires:
      - name: bookshop-db

  # ---- Standalone Approuter ----
  - name: bookshop-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      memory: 256M
      disk-quota: 256M
    requires:
      - name: bookshop-auth
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: bookshop-html5-repo-runtime
    properties:
      TENANT_HOST_PATTERN: "^(.*)-${default-uri}"

  # ---- HTML5 App Deployer ----
  - name: bookshop-app-deployer
    type: com.sap.application.content
    path: .
    requires:
      - name: bookshop-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: bookshop-app
          artifacts:
            - "./*"
          target-path: resources/bookshop-books/

  # ---- Fiori App (build artifact) ----
  - name: bookshop-app
    type: html5
    path: app/books
    build-parameters:
      builder: custom
      commands:
        - echo "nothing to build"
      build-result: webapp
      supported-platforms:
        []

resources:
  - name: bookshop-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: bookshop-${org}-${space}
        tenant-mode: dedicated

  - name: bookshop-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: bookshop-html5-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

  - name: bookshop-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

parameters:
  enable-parallel-deployments: true
